  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1px 0; border-bottom: 1px solid #eef2f6; }\n  .toc li::before { content: counter(toc,decimal-leading-zero); font-family: \"Archivo\"; font-weight: 700;\n            color: #0067b1; font-size: 14px; min-width: 26px; }\n  .toc .t { font-weight: 600; color: #0b2238; }\n  .toc .d { flex: 1; border-bottom: 1px dotted #cdd8e1; transform: translateY(-3px); }\n\n  /* ---- Print button (screen only) ---- */\n  .printbtn { position: fixed; top: 18px; right: 18px; z-index: 50; font-family: \"Archivo\";\n              font-weight: 600; font-size: 13px; background: #0067b1; color: #fff; border: none;\n              border-radius: 8px; padding: 9px 16px; cursor: pointer; box-shadow: 0 4px 14px rgba(0,103,177,0.3); }\n\n  @page { size: letter; margin: 0; }\n  @media print {\n    html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }\n    html, body { margin: 0; padding: 0; }\n    .doc { max-width: none !important; margin: 0 !important; padding: 0 0.75in !important; }\n    #dc-root, .sc-host { height: auto !important; }\n    .hdr-space, .ftr-space { display: table-cell; height: 0.9in !important; }\n    .running-hdr, .running-ftr { display: flex !important; justify-content: space-between;\n        align-items: baseline; position: fixed !important; left: 0; right: 0; margin: 0 !important;\n        font-family: \"Archivo\"; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;\n        color: #7e8e9a; }\n    .running-hdr { top: 0; padding: 0.42in 0.75in 0 !important; border-bottom: 1px solid #e7edf2; }\n    .running-hdr::after { content: \"\"; }\n    .running-ftr { bottom: 0; padding: 0 0.75in 0.42in !important; }\n    .running-hdr b, .running-ftr b { color: #0067b1; font-weight: 700; }\n    .cover { margin-top: 0; break-after: page; }\n    .toc { break-after: page; }\n    h1,h2,h3,h4 { break-after: avoid; }\n    figure, table, blockquote, .callout, ol.steps > li { break-inside: avoid; }\n    p, li { orphans: 3; widows: 3; }\n    .screen-only { display: none !important; }\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<button class=\"printbtn screen-only\" onclick=\"{{ doPrint }}\">Baixar PDF / Imprimir<\u002Fbutton>\n\n<main class=\"doc\">\n  <div class=\"running-hdr\"><span>Portal de Periódicos Científicos · <b>UnB<\u002Fb><\u002Fspan><span>Manual — Atribuição de DOI<\u002Fspan><\u002Fdiv>\n  <div class=\"running-ftr\"><span>Biblioteca Central · Universidade de Brasília<\u002Fspan><span>periodicos.unb.br<\u002Fspan><\u002Fdiv>\n\n  <table class=\"doc-frame\" role=\"presentation\">\n    <thead><tr><td class=\"hdr-space\"><\u002Ftd><\u002Ftr><\u002Fthead>\n    <tbody><tr><td>\n\n      <!-- ===== COVER ===== -->\n      <section class=\"cover\">\n        \n        <img class=\"logo\" src=\"9f6fcb44-9fdf-4ff4-b668-0e803ff493c2\" alt=\"Periódicos Científicos de Acesso Livre — UnB\" style=\"border-radius: 0px; padding-top: 0px; padding-right: 0px; padding-bottom: 0px; padding-left: 0px; position: static\"><div class=\"rule\"><\u002Fdiv>\n        <div class=\"kicker\">PORTAL DE PERIÓDICOS CIENTÍFICOS DE ACESSO ABERTO - UNB<\u002Fdiv>\n        <h1>Atribuição de DOI no fluxo editorial<\u002Fh1>\n        <p class=\"sub\">Guia de configuração e uso do identificador digital de objeto (DOI) para editores das revistas hospedadas no portal.<\u002Fp>\n        <div class=\"meta\">\n          <div><b>Público<\u002Fb>Editores<\u002Fdiv>\n          <div><b>Elaboração<\u002Fb>Leonardo R. Carvalho&nbsp;<div>Bibliotecário-Documentalista (BCE-UnB)<\u002Fdiv><\u002Fdiv>\n          <div><b>Sistema<\u002Fb>OJS 3.4<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ===== TOC ===== -->\n      <section class=\"toc\">\n        <span class=\"eyebrow\">Sumário<\u002Fspan>\n        <ol>\n          <p class=\"lead\">Tutorial baseado na versão 3.4 do OJS. Este tutorial está dividido nos seguintes tópicos:<\u002Fp><li><span class=\"t\">Notações<\u002Fspan><span class=\"d\"><\u002Fspan><\u002Fli>\n          <li><span class=\"t\">Atribuição<\u002Fspan><span class=\"d\"><\u002Fspan><\u002Fli>\n        <\u002Fol>\n      <\u002Fsection>\n\n      \n\n      <!-- ===== 1 ===== -->\n      <div class=\"sec\"><span class=\"num\">1<\u002Fspan><h2>Notações<\u002Fh2><\u002Fdiv>\n      <p>As notações utilizadas serão, a partir de 2026, padronizadas para o modelo seguinte:<\u002Fp>\n\n      <h3 style=\"margin:26px 0 0;\">Notação de Artigo<\u002Fh3>\n\n      <div style=\"display:flex; justify-content:center; margin:16px 0 4px;\">\n        <div style=\"display:flex; align-items:center; justify-content:center; gap:14px; flex-wrap:wrap;\n                    min-height:64px; padding:18px 28px; background:#eef5fb; border:1px solid #d3e6f5;\n                    border-radius:8px; text-align:center; color:#0b2238;\n                    font-family:'Archivo',sans-serif; font-weight:600; font-size:16px; min-width:60%;\">\n          <span style=\"color:#7d8d99; font-weight:500;\"><a href=\"https://doi.org/10.26512/0000-0000.2025.e23260\"><\u002Fa><a href=\"https://doi.org/10.26512/0000-0000.2025.e23260\" style=\"color: #0067b1\"><\u002Fa><a href=\"https://doi.org/10.26512/0000-0000.2025.e23260\"><\u002Fa><a href=\"https://doi.org/10.26512/0000-0000.2025.e23260\" style=\"font-weight: 700\">https://doi.org/10.26512/0000-0000.2025.e23260<\u002Fa><a class=\"Hyperlink SCXW182140899 BCX0\" href=\"https://doi.org/10.26512/0000-0000.2025.e23260\" target=\"_blank\" rel=\"noreferrer noopener\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; cursor: text; font-family: &quot;Segoe UI&quot;, &quot;Segoe UI Web&quot;, Arial, Verdana, sans-serif; font-size: 12px; background-color: rgb(255, 255, 255); color: inherit;\"><span data-contrast=\"none\" xml:lang=\"PT-BR\" lang=\"PT-BR\" class=\"TextRun Underlined SCXW182140899 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; color: rgb(70, 120, 134); font-size: 12pt; text-decoration: underline; line-height: 18px; font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif; font-weight: bold; font-variant-ligatures: none !important;\"><\u002Fspan><\u002Fa><span data-contrast=\"auto\" xml:lang=\"PT-BR\" lang=\"PT-BR\" class=\"TextRun EmptyTextRun SCXW182140899 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; color: rgb(0, 0, 0); background-color: rgb(255, 255, 255); font-size: 12pt; line-height: 18px; font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif; font-variant-ligatures: none !important;\"><\u002Fspan><span class=\"EOP Selected SCXW182140899 BCX0\" data-ccp-props=\"{&quot;134233117&quot;:false,&quot;201341983&quot;:2,&quot;335551550&quot;:2,&quot;335551620&quot;:2,&quot;335559685&quot;:260,&quot;335559740&quot;:0}\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; color: rgb(0, 0, 0); font-size: 12pt; line-height: 18px; font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif; background-color: rgb(198, 198, 198) !important; border-color: rgb(198, 198, 198) !important;\">&nbsp;<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; justify-content:center; margin:8px 0 4px;\">\n        \n      <\u002Fdiv>\n\n      <table class=\"data\">\n        <thead><tr><th style=\"text-align: center\">Estrutura<\u002Fth><th style=\"text-align: center\">Significado<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>https://doi.org/<\u002Ftd><td>início da URL do DOI<\u002Ftd><\u002Ftr>\n          <tr><td>10.26512/<\u002Ftd><td>Prefixo BCE<\u002Ftd><\u002Ftr>\n          <tr><td>2025.<\u002Ftd><td>ISSN da revista (com ponto ao final)<\u002Ftd><\u002Ftr>\n          <tr><td>e23260<\u002Ftd><td>e-location. ID do artigo no OJS<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n\n      <h3 style=\"margin:34px 0 0;\">Notação de Edições<\u002Fh3>\n\n      <div style=\"display:flex; justify-content:center; margin:16px 0 4px;\">\n        <div style=\"display:flex; align-items:center; justify-content:center; gap:14px; flex-wrap:wrap;\n                    min-height:64px; padding:18px 28px; background:#eef5fb; border:1px solid #d3e6f5;\n                    border-radius:8px; text-align:center; color:#0b2238;\n                    font-family:'Archivo',sans-serif; font-weight:600; font-size:16px; min-width:60%;\">\n          <span style=\"color:#7d8d99; font-weight:500;\"><a href=\"https://doi.org/10.26512/0000-0000.2025.e23260\"><\u002Fa><a href=\"https://doi.org/10.26512/0000-0000.2025.e23260\" style=\"font-weight: 700\">https://doi.org/10.26512/0000-0000.v12.n3.2025<\u002Fa><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <table class=\"data\">\n        <thead><tr><th style=\"text-align: center\">Estrutura<\u002Fth><th style=\"text-align: center\">Significado<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>https://doi.org/<\u002Ftd><td>início da URL do DOI<\u002Ftd><\u002Ftr>\n          <tr><td>10.26512.<\u002Ftd><td>Prefixo BCE<\u002Ftd><\u002Ftr>\n          <tr><td>0000-0000.<\u002Ftd><td>ISSN da revista (com ponto ao final)<\u002Ftd><\u002Ftr>\n          <tr><td>v12.<\u002Ftd><td>Volume (com ponto ao final)<\u002Ftd><\u002Ftr><tr><td>n3.<\u002Ftd><td>Número (com ponto ao final)*<\u002Ftd><\u002Ftr><tr><td>2025<\u002Ftd><td>Ano da edição<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n\n      \n\n      <p>* Revistas em fluxo contínuo não recebem numeração. Nesse caso, a notação seguirá o seguinte padrão:&nbsp;https://doi.org/10.26512/0000-0000.v12.2025.<\u002Fp><p>Em caso de dúvidas sobre o processo, entre em contato com a equipe responsável pelo Portal de Periódicos Científicos da UnB.<\u002Fp>\n\n      <!-- ===== 2 ===== -->\n      <div class=\"sec\"><span class=\"num\">2<\u002Fspan><h2>Atribuição<\u002Fh2><\u002Fdiv>\n      \n      <p style=\"position: static\">Utilize a aba específica, localizada no menu principal, logo <strong>abaixo de “Notícias”<\u002Fstrong>.<\u002Fp><p><span class=\"path\" style=\"color: #2b3b86\"><span class=\"lbl\">CAMINHO:<\u002Fspan><span class=\"arr\" style=\"color: #0067B1\">Barra Lateral ›<\u002Fspan> DOIs<\u002Fspan><\u002Fp>\n\n      <ol class=\"steps\">\n        <li>No menu principal, abra a aba <strong>DOIs<\u002Fstrong> (abaixo de “Notícias”).\n          <figure class=\"shot\" style=\"margin:14px 0 4px;\">\n            <div class=\"frame\"><div class=\"bar\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n              <div style=\"padding:20px 22px; background:#fff; display:flex; justify-content:center;\">\n                <img src=\"d0ac9c0e-ca11-4beb-907b-a17148b6a0b1\" alt=\"Menu principal com a aba DOIs em destaque, abaixo de Notícias\" style=\"width:200px; height:auto; display:block; border:1px solid #eef2f6; border-radius:4px;\"><\u002Fdiv><\u002Fdiv>\n            <figcaption><b>Figura 1.<\u002Fb> Localização da aba <em>DOIs<\u002Fem>, logo abaixo de “Notícias”.<\u002Ffigcaption>\n          <\u002Ffigure>\n        <\u002Fli>\n        <li><strong>Selecione os artigos<\u002Fstrong> que receberão a atribuição.\n          <figure class=\"shot\" style=\"margin:14px 0 4px;\">\n            <div class=\"frame\"><div class=\"bar\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n              <div class=\"ph\" style=\"aspect-ratio: 16/6\"><img src=\"46ba3d70-1c44-4d86-9eea-badcc3054169\" alt=\"Menu principal com a aba DOIs em destaque, abaixo de Notícias\" style=\"width: 611px; height: auto; display: block; border: 1px solid #eef2f6; border-radius: 4px\"><\u002Fdiv><\u002Fdiv>\n            <figcaption><b>Figura 2.<\u002Fb> Seleção dos artigos que receberão a atribuição.<\u002Ffigcaption>\n          <\u002Ffigure>\n        <\u002Fli><li><strong><span style=\"font-weight: normal;\">Clique em<\u002Fspan> AÇÃO EM MASSA<\u002Fstrong> que receberão a atribuição.\n          <figure class=\"shot\" style=\"margin: 14px 0 4px\">\n            <div class=\"frame\"><div class=\"bar\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n              <div class=\"ph\" style=\"aspect-ratio:16/6;\"><img src=\"9f52cc32-a3cd-4787-8385-31e20dc11ff7\" alt=\"Menu principal com a aba DOIs em destaque, abaixo de Notícias\" style=\"width: 611px; height: auto; display: block; border: 1px solid #eef2f6; border-radius: 4px\"><\u002Fdiv><\u002Fdiv>\n            <figcaption><b>Figura 2.<\u002Fb>&nbsp;Botão de ação em massa.&nbsp;<\u002Ffigcaption>\n          <\u002Ffigure>\n        <\u002Fli><div class=\"callout c-warn\" style=\"margin-top: 14px; margin-bottom: 14px; padding-top: 20px; padding-bottom: 20px\">\n        <div class=\"ico\" style=\"background-color: #b01212\">!<\u002Fdiv>\n        <div><div class=\"ttl\" style=\"color: #941110; position: static; top: 6px\">Atenção<\u002Fdiv><p style=\"position: relative; top: 10px\">Não utilizar o botão de <b>DEPOSITAR DOIs<\u002Fb> (uso EXCLUSIVO da gestão do PPCAA-UnB)*<\u002Fp><div><div style=\"font-size: 13px; position: relative; overflow: visible; top: 13px\">*não se aplica às revistas que não recebem pela BCE&nbsp;<\u002Fdiv><br><\u002Fdiv><p><\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n        <li>Clique no botão <b>ATRIBUIR DOIs<\u002Fb> e confirme novamente a ação.<\u002Fli><figure class=\"shot\" style=\"margin: 14px 0 4px\">\n            <div class=\"frame\"><div class=\"bar\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n              <div class=\"ph\" style=\"aspect-ratio:16/6;\"><img src=\"e0976f58-6b7d-494a-b09d-3a2b5de729cd\" alt=\"Menu principal com a aba DOIs em destaque, abaixo de Notícias\" style=\"width: 611px; height: auto; display: block; border: 1px solid #eef2f6; border-radius: 4px\"><\u002Fdiv><\u002Fdiv>\n            <figcaption><b>Figura 2.<\u002Fb>&nbsp;Mensagem de confirmação da atribuição.<\u002Ffigcaption>\n          <\u002Ffigure><li style=\"top: 16px\">Concluída a atribuição, o artigo já está pronto para ter seu DOI ativado. Informe a equipe do PPCAA-UnB para que o identificador seja ativado.&nbsp;<\u002Fli>\n      <\u002Fol>\n\n      \n\n      <div class=\"callout c-tip\" style=\"position: relative; top: 33px\">\n        <div class=\"ico\">✓<\u002Fdiv>\n        <div><div class=\"ttl\">Dica<\u002Fdiv><p>É possível selecionar vários artigos de uma só vez para atribuir os DOIs em lote, agilizando o tratamento de edições retroativas.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Ftd><\u002Ftr><\u002Ftbody>\n    <tfoot><tr><td class=\"ftr-space\"><\u002Ftd><\u002Ftr><\u002Ftfoot>\n  <\u002Ftable><div class=\"callout c-warn\" style=\"position: relative; top: 35px\">\n        <div class=\"ico\">!<\u002Fdiv>\n        <div><div class=\"ttl\">Atenção<\u002Fdiv><p>Depois de atribuir os DOIs, <strong>avise a equipe do portal<\u002Fstrong> para que os números sejam ativados. Sem essa ativação, os identificadores não funcionarão.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n<\u002Fmain>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return { doPrint: () => window.print() };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
